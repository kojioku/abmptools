name: windows-native

# formulation の OpenFF route と abmptools.trajectory が **Windows ネイティブ**
# (WSL なし、 AmberTools なし) で動くことを実機 (windows-latest runner) で検証する。
#
# 2 ジョブ:
#   1. windows-pure-python — pip のみ。 trajectory (gmx subprocess を mock) +
#      formulation の純 Python unit test を走らせ、 pathlib / subprocess shell=False
#      など OS 依存箇所を検証。
#   2. windows-openff-smoke — micromamba (conda-forge) で OpenFF stack を入れ、
#      PDBFixer + Topology.from_pdb + ff14SB SMIRNOFF の parametrization smoke
#      (tests/integration/test_openff_windows_smoke.py) を走らせる。
#
# packmol / gmx は外部ツール (ユーザーが別途 install) なので CI では呼ばない。
# 検証対象はあくまで「AmberTools 非依存の Python parametrization 層」。
#
# 起動方法: (1) main に本ファイルが入れば Actions タブの "Run workflow"
# (workflow_dispatch)、 (2) formulation / trajectory を変更する PR で pull_request
# トリガ。 default branch (main) 未配置の間は (2) の PR 経由で実機検証する。

on:
  workflow_dispatch:        # 手動トリガ (課金/runner 時間を抑えるため push trigger にしない)
  pull_request:
    paths:
      - "abmptools/formulation/**"
      - "abmptools/trajectory/**"
      - "tests/integration/test_openff_windows_smoke.py"
      - ".github/workflows/windows-native.yml"

jobs:
  windows-pure-python:
    name: Windows pure-Python (trajectory + formulation unit, pip only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install (pip, light deps only)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # 重い科学スタック無しで動く範囲: numpy/pandas/pytest + 本体
          python -m pip install numpy pandas pytest
          python -m pip install -e . || python -m pip install .
      - name: Trajectory unit tests (gmx subprocess は mock)
        shell: bash
        run: |
          python -m pytest tests/test_trajectory_postprocess.py -v
      - name: Formulation pure-Python unit tests
        shell: bash
        run: |
          # heavy deps を要しない (mock/skip される) もの
          python -m pytest tests/test_formulation_models.py \
                           tests/test_formulation_ndx.py \
                           tests/test_formulation_mdp.py -v

  windows-openff-smoke:
    name: Windows OpenFF route smoke (PDBFixer + Topology.from_pdb + ff14SB)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup micromamba + OpenFF stack (conda-forge)
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: openff-win
          # AmberTools は Windows の conda build が無いため、 ambertools に依存する
          # メタパッケージ `openff-toolkit` は Windows でインストール不可。
          # ambertools 非依存 (RDKit バックエンド) の `openff-toolkit-base` を使う。
          # 本 smoke は ff14SB の library charges のみ使い AM1-BCC (sqm) を呼ばないので
          # base で十分。 新しめの openff-toolkit-base は python>=3.11 が必要。
          create-args: >-
            python=3.11
            openff-toolkit-base
            openff-interchange
            openff-amber-ff-ports
            openmm
            pdbfixer
            rdkit
            pytest
      - name: pip extras (PeptideBuilder + biopython + 本体)
        shell: bash -el {0}
        run: |
          python -m pip install PeptideBuilder biopython
          python -m pip install -e . || python -m pip install .
      - name: OpenFF Windows-native smoke
        shell: bash -el {0}
        run: |
          # AmberTools 非依存の parametrization 層を検証
          # (sequence → PeptideBuilder → PDBFixer → Topology.from_pdb → ff14SB Interchange)
          python -m pytest tests/integration/test_openff_windows_smoke.py -v -m slow
